<!DOCTYPE html>
<html>
<head>
    <title>Teste Processo 2 Real - Validação dos Padrões</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .resultado { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .sucesso { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .detalhes { font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Teste com Texto Real - Processo 2</h1>
    <div id="resultados"></div>

    <script>
        const textoRealProcesso2 = `
As impugnações apresentadas pela reclamada já foram objeto de esclarecimentos pelo sr. Perito nos Id. ZZZZ, nada havendo a ser reparado no laudo.

Destarte, dou por encerradas as impugnações ao laudo e HOMOLOGO os cálculos de liquidação elaborados pelo sr. Perito (02dea67), fixando o crédito do autor em R$ 24.059,25, referente ao principal acrescido do FGTS, para 16/06/2025, atualizado pelo IPCA-E na fase pré-judicial e, a partir do ajuizamento da ação, pela taxa SELIC (art. 406 do Código Civil), conforme decisão do E. STF nas ADCs 58 e 59 e ADI 5867.

Arbitro honorários periciais contábeis no montante de R$2.500,00, pela reclamada.

Não há débitos ou descontos previdenciários.

Não há deduções fiscais cabíveis.

Honorários advocatícios sucumbenciais pela reclamada, no importe de R$ 1202,96, para 16/06/2025.

Custas de R$ 440,00, pela reclamada, para 05/07/2024.

Ante os termos da decisão proferida pelo E. STF na ADI 5766, e considerando o deferimento dos benefícios da justiça gratuita ao autor, é indevido o pagamento de honorários sucumbenciais pelo trabalhador ao advogado da parte reclamada.

Intimações:

Documento assinado eletronicamente por ROGERIO APARECIDO ROSA, em 18/06/2025, às 09:16:41 - 02dea67
`;

        // Valores esperados corretos do processo 2
        const valoresEsperadosProcesso2 = {
            total: '24.059,25',
            dataLiquidacao: '16/06/2025',
            idPlanilha: '02dea67',
            custas: '440,00',
            assinatura: '02dea67',
            inss: null, // Não há débitos previdenciários
            honorarios: '1202,96'
        };

        // Padrões atuais do CALC.user.js
        const padroes = {
            totalBruto: /(?:Total\s+(?:Bruto|Geral|dos\s+Créditos?)[\s\S]*?|TOTAL[\s\S]*?|Valor\s+Total[\s\S]*?|crédito\s+(?:do\s+)?autor[\s\S]*?)(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2})/i,
            dataLiquidacao: /(?:Data\s+(?:de\s+)?Liquidação|Atualização|Cálculo|para\s+)[\s\S]*?(\d{1,2}\/\d{1,2}\/\d{4})/i,
            assinaturaId: /(?:Planilha|ID|Identificação|Assinatura|Perito\s*\()[\s\S]*?([A-Za-z0-9]{6,})/i,
            custas: /(?:Custas?\s+(?:de\s+)?(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2}))/i,
            honorarios: /(?:Honorários?\s+(?:Advocatícios?|Sucumbenciais?|de\s+Sucumbência)|Hon\.?\s+Adv)[\s\S]*?(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2})/i,
            inss: /(?:INSS|Instituto\s+Nacional|débitos\s+(?:ou\s+)?descontos\s+previdenciários)[\s\S]*?(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2})/i
        };

        function testarPadrao(nome, padrao, textoTeste, valorEsperado) {
            const match = textoTeste.match(padrao);
            const valorExtraido = match ? match[1] : null;
            
            let resultado = {
                nome: nome,
                esperado: valorEsperado,
                extraido: valorExtraido,
                sucesso: false,
                detalhes: ''
            };

            if (valorEsperado === null) {
                // Esperamos que não encontre nada
                if (valorExtraido === null) {
                    resultado.sucesso = true;
                    resultado.detalhes = `✅ Nenhum valor encontrado, como esperado (INSS não aplicável)`;
                } else {
                    resultado.sucesso = false;
                    resultado.detalhes = `❌ Esperado: nenhum valor, mas extraído: "${valorExtraido}"`;
                }
            } else {
                // Esperamos um valor específico
                if (valorExtraido === valorEsperado) {
                    resultado.sucesso = true;
                    resultado.detalhes = `✅ Valor extraído corretamente: ${valorExtraido}`;
                } else {
                    resultado.sucesso = false;
                    resultado.detalhes = `❌ Esperado: "${valorEsperado}", Extraído: "${valorExtraido}"`;
                    if (match) {
                        resultado.detalhes += `<br><span class="detalhes">Match completo: ${JSON.stringify(match.slice(0, 3))}</span>`;
                    } else {
                        resultado.detalhes += '<br><span class="detalhes">Nenhum match encontrado</span>';
                    }
                }
            }

            return resultado;
        }

        function executarTestes() {
            const resultados = [];
            const resultadosDiv = document.getElementById('resultados');

            // Testar cada padrão
            resultados.push(testarPadrao('Total Bruto', padroes.totalBruto, textoRealProcesso2, valoresEsperadosProcesso2.total));
            resultados.push(testarPadrao('Data de Liquidação', padroes.dataLiquidacao, textoRealProcesso2, valoresEsperadosProcesso2.dataLiquidacao));
            resultados.push(testarPadrao('ID/Assinatura', padroes.assinaturaId, textoRealProcesso2, valoresEsperadosProcesso2.assinatura));
            resultados.push(testarPadrao('Custas', padroes.custas, textoRealProcesso2, valoresEsperadosProcesso2.custas));
            resultados.push(testarPadrao('Honorários', padroes.honorarios, textoRealProcesso2, valoresEsperadosProcesso2.honorarios));
            resultados.push(testarPadrao('INSS', padroes.inss, textoRealProcesso2, valoresEsperadosProcesso2.inss));

            // Exibir resultados
            let sucessos = 0;
            resultados.forEach(resultado => {
                const div = document.createElement('div');
                div.className = `resultado ${resultado.sucesso ? 'sucesso' : 'erro'}`;
                div.innerHTML = `
                    <strong>${resultado.nome}</strong><br>
                    ${resultado.detalhes}
                `;
                resultadosDiv.appendChild(div);

                if (resultado.sucesso) sucessos++;
            });

            // Resumo final
            const resumo = document.createElement('div');
            resumo.className = `resultado ${sucessos === resultados.length ? 'sucesso' : 'info'}`;
            resumo.innerHTML = `
                <h3>Resumo Final</h3>
                <strong>Sucessos: ${sucessos}/${resultados.length}</strong><br>
                Taxa de acerto: ${((sucessos / resultados.length) * 100).toFixed(1)}%<br>
                ${sucessos === resultados.length ? '🎉 TODOS OS TESTES PASSARAM!' : '⚠️ ALGUNS TESTES FALHARAM!'}
            `;
            resultadosDiv.appendChild(resumo);

            // Mostrar o texto de teste
            const textoDiv = document.createElement('div');
            textoDiv.className = 'resultado info';
            textoDiv.innerHTML = `
                <h3>Texto Real da Decisão Utilizado</h3>
                <pre>${textoRealProcesso2}</pre>
            `;
            resultadosDiv.appendChild(textoDiv);
        }

        // Executar testes quando a página carregar
        window.onload = executarTestes;
    </script>
</body>
</html>
