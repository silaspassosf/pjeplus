<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciador de Domínios</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; max-width: 900px; }
    th, td { border: 1px solid #ccc; padding: 8px 10px; text-align: left; }
    th { background: #f0f0f0; }
    tr:nth-child(even) { background: #fafafa; }
    .verde { color: #fff; background: #2e7d32; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    .vermelho { color: #fff; background: #c62828; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    .center { text-align: center; }
    .btn { margin-top: 24px; padding: 10px 24px; font-size: 1.1em; background: #1976d2; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .btn:hover { background: #125ea2; }
    .checkbox-group { display: flex; gap: 10px; align-items: center; }
    .checkbox-group label { cursor: pointer; }
  </style>
</head>
<body>
  <h2>Gerenciador de Domínios</h2>
  <table id="dominios-table">
    <thead>
      <tr>
        <th>URL</th>
        <th>Apagar?</th>
        <th>Unsub</th>
      </tr>
    </thead>
    <tbody>
      <!-- Linhas geradas por JS -->
    </tbody>
  </table>

  <input type="file" id="fileInput" accept=".js,.txt" style="margin-top:18px;">
  <button class="btn" onclick="exportarDominios()">Exportar para dominios.js</button>
  <textarea id="saida" style="width:100%;height:120px;margin-top:18px;display:none;"></textarea>
  <script>
    let dominios = [];
    function parseDominios(raw) {
      return raw.split('\n')
        .map(l => l.trim())
        .filter(l => l && l.includes('|'))
        .map(l => {
          const [dom, , canc] = l.split('|').map(s => s.trim());
          if (!dom || dom === '') return null;
          return {
            dominio: dom,
            cancelado: canc && canc.toLowerCase().includes('sim') ? 'sim' : 'nao',
            apagar: 'sim' // default
          };
        })
        .filter(Boolean);
    }
    function renderTable() {
      const tbody = document.querySelector('#dominios-table tbody');
      tbody.innerHTML = '';
      if (!dominios.length) return;
      dominios.forEach((d, idx) => {
        const tr = document.createElement('tr');
        // Coluna 1: URL
        const tdUrl = document.createElement('td');
        tdUrl.textContent = d.dominio;
        tr.appendChild(tdUrl);
        // Coluna 2: Apagar?
        const tdApagar = document.createElement('td');
        tdApagar.className = 'center';
        const group = document.createElement('div');
        group.className = 'checkbox-group';
        const simId = `sim_${idx}`;
        const naoId = `nao_${idx}`;
        const sim = document.createElement('input');
        sim.type = 'checkbox';
        sim.id = simId;
        sim.checked = d.apagar === 'sim';
        sim.addEventListener('change', () => {
          if (sim.checked) {
            nao.checked = false;
            d.apagar = 'sim';
          } else if (!nao.checked) {
            sim.checked = true;
          }
        });
        const simLabel = document.createElement('label');
        simLabel.htmlFor = simId;
        simLabel.textContent = 'Sim';
        const nao = document.createElement('input');
        nao.type = 'checkbox';
        nao.id = naoId;
        nao.checked = d.apagar === 'nao';
        nao.addEventListener('change', () => {
          if (nao.checked) {
            sim.checked = false;
            d.apagar = 'nao';
          } else if (!sim.checked) {
            nao.checked = true;
          }
        });
        const naoLabel = document.createElement('label');
        naoLabel.htmlFor = naoId;
        naoLabel.textContent = 'Não';
        group.appendChild(sim);
        group.appendChild(simLabel);
        group.appendChild(nao);
        group.appendChild(naoLabel);
        tdApagar.appendChild(group);
        tr.appendChild(tdApagar);
        // Coluna 3: Unsub
        const tdUnsub = document.createElement('td');
        if (d.cancelado === 'sim') {
          tdUnsub.innerHTML = '<span class="verde">Cancelado</span>';
        } else {
          tdUnsub.innerHTML = '<span class="vermelho">CANCELAR?!</span>';
        }
        tr.appendChild(tdUnsub);
        tbody.appendChild(tr);
      });
    }

    function exportarDominios() {
      // Ordena: apagar sim primeiro, depois nao, ambos em ordem alfabética
      const sim = dominios.filter(d => d.apagar === 'sim').sort((a, b) => a.dominio.localeCompare(b.dominio, 'pt-BR'));
      const nao = dominios.filter(d => d.apagar === 'nao').sort((a, b) => a.dominio.localeCompare(b.dominio, 'pt-BR'));
      const todos = sim.concat(nao);
      const linhas = todos.map(d => `${d.dominio} | sim | cancelado: ${d.cancelado}`);
      const saida = linhas.join('\n');
      const ta = document.getElementById('saida');
      ta.value = saida;
      ta.style.display = 'block';
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      window.scrollTo(0, document.body.scrollHeight);
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) {
        console.log('[DEBUG] Nenhum arquivo selecionado.');
        return;
      }
      const reader = new FileReader();
      reader.onload = function(evt) {
        const raw = evt.target.result;
        console.log('[DEBUG] Conteúdo bruto do arquivo:', raw.slice(0, 500));
        dominios = parseDominios(raw);
        console.log('[DEBUG] Domínios parseados:', dominios);
        dominios.sort((a, b) => a.dominio.localeCompare(b.dominio, 'pt-BR'));
        renderTable();
        console.log('[DEBUG] Tabela renderizada.');
      };
      reader.readAsText(file, 'utf-8');
    });

    // ...existing code...
  </script>
</body>
</html>
