<!DOCTYPE html>
<html>
<head>
    <title>Teste Processo 2 - Validação dos Padrões</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .resultado { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .sucesso { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Teste Manual - Processo 2</h1>
    <div id="resultados"></div>

    <script>
        // Dados esperados para o processo 2 conforme especificado pelo usuário
        const dadosEsperados = {
            total: 'R$ 23.052,24',
            dataLiquidacao: '03/08/2023',
            idPlanilha: 'P5502',
            custas: 'R$ 299,89',
            assinatura: 'P5502',
            inss: 'R$ 1.035,16',
            honorarios: 'R$ 2.305,22'
        };

        // Padrões de extração do CALC.user.js
        const padroes = {
            totalBruto: /(?:Total\s+(?:Bruto|Geral|dos\s+Créditos?)[\s\S]*?|TOTAL[\s\S]*?|Valor\s+Total[\s\S]*?)(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2})/i,
            dataLiquidacao: /(?:Data\s+(?:de\s+)?Liquidação|Atualização|Cálculo)[\s\S]*?(\d{1,2}\/\d{1,2}\/\d{4})/i,
            assinaturaId: /(?:Planilha|ID|Identificação|Assinatura)[\s\S]*?([A-Z]\d{4,})/i,
            custas: /(?:Custas?|Taxa)[\s\S]*?(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2})/i,
            honorarios: /(?:Honorários?\s+(?:Advocatícios?|Sucumbenciais?|de\s+Sucumbência)|Hon\.?\s+Adv)[\s\S]*?(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2})/i,
            inss: /(?:INSS|Instituto\s+Nacional)[\s\S]*?(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2})/i
        };

        // Texto simulado do processo 2 com os dados corretos
        const textoProcesso2 = `
        CÁLCULO DE LIQUIDAÇÃO DE SENTENÇA

        Planilha de Cálculo ID: P5502
        Data de Liquidação: 03/08/2023

        Discriminação dos Valores:

        Valor Principal: R$ 19.412,76
        Correção Monetária: R$ 1.299,21

        Deduções:
        INSS: R$ 1.035,16
        Custas Processuais: R$ 299,89

        Honorários Advocatícios: R$ 2.305,22

        TOTAL GERAL DOS CRÉDITOS: R$ 23.052,24

        Assinatura Digital: P5502
        `;

        function testarPadrao(nome, padrao, textoTeste, valorEsperado) {
            const match = textoTeste.match(padrao);
            const valorExtraido = match ? match[1] : null;
            
            let resultado = {
                nome: nome,
                esperado: valorEsperado,
                extraido: valorExtraido,
                sucesso: false,
                detalhes: ''
            };

            if (valorExtraido === valorEsperado) {
                resultado.sucesso = true;
                resultado.detalhes = `✅ Valor extraído corretamente: ${valorExtraido}`;
            } else {
                resultado.sucesso = false;
                resultado.detalhes = `❌ Esperado: "${valorEsperado}", Extraído: "${valorExtraido}"`;
                if (match) {
                    resultado.detalhes += `\nMatch completo: ${JSON.stringify(match)}`;
                } else {
                    resultado.detalhes += '\nNenhum match encontrado';
                }
            }

            return resultado;
        }

        function executarTestes() {
            const resultados = [];
            const resultadosDiv = document.getElementById('resultados');

            // Testar cada padrão
            resultados.push(testarPadrao('Total Bruto', padroes.totalBruto, textoProcesso2, '23.052,24'));
            resultados.push(testarPadrao('Data de Liquidação', padroes.dataLiquidacao, textoProcesso2, '03/08/2023'));
            resultados.push(testarPadrao('ID/Assinatura', padroes.assinaturaId, textoProcesso2, 'P5502'));
            resultados.push(testarPadrao('Custas', padroes.custas, textoProcesso2, '299,89'));
            resultados.push(testarPadrao('Honorários', padroes.honorarios, textoProcesso2, '2.305,22'));
            resultados.push(testarPadrao('INSS', padroes.inss, textoProcesso2, '1.035,16'));

            // Exibir resultados
            let sucessos = 0;
            resultados.forEach(resultado => {
                const div = document.createElement('div');
                div.className = `resultado ${resultado.sucesso ? 'sucesso' : 'erro'}`;
                div.innerHTML = `
                    <strong>${resultado.nome}</strong><br>
                    ${resultado.detalhes}
                `;
                resultadosDiv.appendChild(div);

                if (resultado.sucesso) sucessos++;
            });

            // Resumo final
            const resumo = document.createElement('div');
            resumo.className = `resultado ${sucessos === resultados.length ? 'sucesso' : 'info'}`;
            resumo.innerHTML = `
                <h3>Resumo Final</h3>
                <strong>Sucessos: ${sucessos}/${resultados.length}</strong><br>
                Taxa de acerto: ${((sucessos / resultados.length) * 100).toFixed(1)}%
            `;
            resultadosDiv.appendChild(resumo);

            // Mostrar o texto de teste
            const textoDiv = document.createElement('div');
            textoDiv.className = 'resultado info';
            textoDiv.innerHTML = `
                <h3>Texto de Teste Utilizado</h3>
                <pre>${textoProcesso2}</pre>
            `;
            resultadosDiv.appendChild(textoDiv);
        }

        // Executar testes quando a página carregar
        window.onload = executarTestes;
    </script>
</body>
</html>
